name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + component tests
        run: pnpm test

      - name: Build package
        run: pnpm build

      - name: Package entry guard (no stub exports, real components resolve)
        run: node scripts/check-package-entry.mjs

      - name: Build Storybook
        run: pnpm build-storybook

  required-checks:
    name: Required Checks Gate
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - build-and-test
    steps:
      - name: Validate required checks passed
        shell: bash
        run: |
          if [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "Required check failed: build-and-test => ${{ needs.build-and-test.result }}"
            exit 1
          fi
          echo "All required checks passed."
