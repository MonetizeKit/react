name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + component tests
        run: pnpm test

      - name: Build package
        run: pnpm build

      - name: Package entry guard (no stub exports, real components resolve)
        run: node scripts/check-package-entry.mjs

      - name: Build Storybook
        run: pnpm build-storybook

  install-smoke:
    name: Published-package install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      # Pack the real tarball, install it into a clean npm project, then
      # type-check + server-render PricingTable as an external consumer.
      - name: Install smoke (pack + consume)
        run: node scripts/install-smoke.mjs

  storybook-tests:
    name: Storybook test-runner (interaction + a11y)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_ENV"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Builds + serves the static Storybook, then runs the test-runner against
      # it: smoke-renders + runs each story's play interactions, plus axe a11y
      # (structural rules; color-contrast deferred — see .storybook/test-runner.ts).
      - name: Storybook test-runner (interaction + axe a11y)
        run: pnpm test-storybook:ci

  required-checks:
    name: Required Checks Gate
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - build-and-test
      - install-smoke
      - storybook-tests
    steps:
      - name: Validate required checks passed
        shell: bash
        run: |
          failed=0
          for result in "build-and-test:${{ needs.build-and-test.result }}" "install-smoke:${{ needs.install-smoke.result }}" "storybook-tests:${{ needs.storybook-tests.result }}"; do
            name="${result%%:*}"
            status="${result##*:}"
            if [ "${status}" != "success" ]; then
              echo "Required check failed: ${name} => ${status}"
              failed=1
            fi
          done
          if [ "${failed}" -ne 0 ]; then exit 1; fi
          echo "All required checks passed."
